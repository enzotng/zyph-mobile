name: CI

on:
  pull_request:
  push:
    branches: [develop, main]

# Cancel superseded runs on the same ref (saves CI minutes on rapid pushes).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Persist Turbo's local cache across runs -> unchanged tasks are restored instantly.
      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            turbo-${{ runner.os }}-

      - name: Format check (Biome)
        run: pnpm exec biome ci

      # Turbo parallelises and caches lint/typecheck/test in a single runner
      # (cheaper than separate jobs that each reinstall deps).
      # TODO: add `--affected` once packages/* exist to skip unchanged packages.
      - name: Lint · Typecheck · Test
        run: pnpm exec turbo run lint typecheck test --cache-dir=.turbo
